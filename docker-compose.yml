version: "3.9"

# =============================================================================
# PHYLLOLEADS - Docker Compose
# Servicios: Frontend (React+Vite) | Backend (FastAPI) | Database (PostgreSQL)
# =============================================================================

services:
  # =========================================================================
  # FRONTEND - React + Vite (TanStack Start SSR con Bun)
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: phylloleads_frontend
    ports:
      - "3000:8080"
    environment:
      # Aquí van variables de entorno si las necesita
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - phylloleads_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # =========================================================================
  # FRONTEND-DEV - Para desarrollo con hot-reload
  # DESCOMENTA ESTO si prefieres desarrollo en lugar del anterior
  # =========================================================================
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile.dev
  #   container_name: phylloleads_frontend_dev
  #   ports:
  #     - "5173:5173"  # Puerto de Vite
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules  # No montar node_modules del host
  #   environment:
  #     VITE_API_URL: http://localhost:8000/api
  #   depends_on:
  #     - backend
  #   stdin_open: true
  #   tty: true
  #   networks:
  #     - phylloleads_network

  # =========================================================================
  # BACKEND - FastAPI + Scrapers
  # =========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phylloleads_backend
    ports:
      - "8000:8000"
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-appdb}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      APP_DB_PATH: /app/appdb.sqlite
      PYTHONUNBUFFERED: 1
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - phylloleads_network
    volumes:
      - ./backend:/app
      - ./backend/test_results:/app/test_results
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # =========================================================================
  # DATABASE - PostgreSQL
  # =========================================================================
  database:
    image: postgres:16-alpine
    container_name: phylloleads_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-appdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - phylloleads_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  phylloleads_network:
    driver: bridge
