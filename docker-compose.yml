version: "3.9"

# =============================================================================
# PHYLLOLEADS - Docker Compose
# Servicios: Frontend (React+Vite) | Backend (FastAPI) | Database (PostgreSQL)
# =============================================================================

services:
  # =========================================================================
  # FRONTEND - React + Vite (TanStack Start Dev Server)
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: phylloleads_frontend
    ports:
      - "1200:5173"
    environment:
      VITE_API_URL: http://localhost:12001
      VITE_WS_URL: ws://localhost:12001
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - phylloleads_network
    stdin_open: true
    tty: true

  # =========================================================================
  # BACKEND - FastAPI + Scrapers
  # =========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phylloleads_backend
    ports:
      - "12001:12001"
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-appdb}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      APP_DB_PATH: /app/appdb.sqlite
      PYTHONUNBUFFERED: 1
      SQLITE_DB: /app/appdb.sqlite
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - phylloleads_network
    volumes:
      - ./backend:/app
      - ./backend/test_results:/app/test_results
    command: uvicorn main:app --host 0.0.0.0 --port 12001 --reload
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:12001/health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 80s

  # =========================================================================
  # DATABASE - PostgreSQL
  # =========================================================================
  database:
    image: postgres:16-alpine
    container_name: phylloleads_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-appdb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - phylloleads_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  postgres_data:
    driver: local

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  phylloleads_network:
    driver: bridge
